<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Invoice Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="invoice-container">
      <h2>Header Invoice Generator</h2>

      <form id="invoice-form" class="invoice-form">
        <div class="form-group">
          <label for="item-name">Item Description</label>
          <input
            type="text"
            id="item-name"
            placeholder="e.g., Web Design Service"
            required
          />
        </div>
        <div class="form-group small">
          <label for="item-qty">Quantity</label>
          <input type="number" id="item-qty" min="1" value="1" required />
        </div>
        <div class="form-group small">
          <label for="item-price">Price ($)</label>
          <input
            type="number"
            id="item-price"
            min="0"
            step="0.01"
            placeholder="0.00"
            required
          />
        </div>
        <button type="submit" class="btn-add">Add Item</button>
      </form>

      <table class="invoice-table" id="invoice-table">
        <thead>
          <tr>
            <th>Description</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="invoice-body"></tbody>
      </table>

      <div class="invoice-summary">
        <div class="total-box">
          <span>Grand Total:</span>
          <span id="grand-total">$0.00</span>
        </div>
        <button onclick="window.print()" class="btn-print">
          Print Invoice
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
